name: price-alert

on:
  schedule:
    # 10分ごと、日本市場時間帯のみ（UTC 0:00-6:30 = JST 9:00-15:30）
    - cron: "*/10 0-6 * * 1-5"
  workflow_dispatch: {}

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Check holdings & alert
        env:
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          TZ: Asia/Tokyo
        run: python scripts/check_alerts.py

      - name: Commit alert state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add state/alerts.json 2>/dev/null || true
          if ! git diff --staged --quiet; then
            git commit -m "Update alert state [skip ci]"
            git push
          else
            echo "no state changes"
          fi
