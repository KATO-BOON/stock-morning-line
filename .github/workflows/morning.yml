name: morning-brief

on:
  schedule:
    # 高負荷時のcronスキップ対策で複数回スケジュール
    # スクリプト側で state/last_sent.json で重複送信を防止
    # 早く届けるため7:30 JSTから30分間隔で4回トライ（:00ジャストを避ける）
    - cron: "33 22 * * *"  # 07:33 JST
    - cron: "53 22 * * *"  # 07:53 JST
    - cron: "13 23 * * *"  # 08:13 JST
    - cron: "37 23 * * *"  # 08:37 JST
  workflow_dispatch: {}

jobs:
  send:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Run morning brief + predictions
        env:
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TZ: Asia/Tokyo
        run: python scripts/send_morning.py

      - name: Commit predictions and state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/predictions.json state/last_sent.json 2>/dev/null || true
          if ! git diff --staged --quiet; then
            git commit -m "Update predictions/state [skip ci]"
            git push
          else
            echo "no changes"
          fi
