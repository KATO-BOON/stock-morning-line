name: morning-brief

on:
  schedule:
    # 23:00 UTC = 08:00 JST (翌日)
    # 毎日走らせ、スクリプト側で平日 or 許可週末かを判定
    - cron: "0 23 * * *"
  workflow_dispatch: {}  # 手動実行可

jobs:
  send:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Run morning brief
        env:
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TZ: Asia/Tokyo
        run: python scripts/send_morning.py
