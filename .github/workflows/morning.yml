name: morning-brief

on:
  # GitHub schedule cron は遅延・スキップ多発のため使用しない
  # Apps Script trigger (毎朝7時 JST) が workflow_dispatch でこのworkflowを起動する
  workflow_dispatch: {}

jobs:
  send:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Run morning brief + predictions
        env:
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TZ: Asia/Tokyo
        run: python scripts/send_morning.py

      - name: Commit predictions and state (with retry)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/predictions.json state/last_sent.json 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "no changes"
            exit 0
          fi
          git commit -m "Update predictions/state [skip ci]"
          # コンフリクト時は最大3回 rebase+push リトライ
          for i in 1 2 3; do
            if git push; then
              echo "[ok] pushed on attempt $i"
              exit 0
            fi
            echo "[retry $i] push rejected, fetch+rebase"
            git pull --rebase --autostash origin main
          done
          echo "[err] failed after 3 retries"
          exit 1
