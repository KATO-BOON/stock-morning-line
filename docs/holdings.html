<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<title>保有銘柄</title>
<meta name="viewport" content="width=device-width,initial-scale=1" />
<link rel="stylesheet" href="styles.css" />
</head>
<body>
<a class="back" href="index.html">← ホームへ</a>
<h1>📊 保有銘柄</h1>

<div class="card">
  <strong>登録済み銘柄</strong>
  <div class="muted">市場時間中（9:00-15:30）10分ごとに監視。損切・利確ライン突破でLINE即通知</div>
  <div id="holdings-list" style="margin-top:10px;"></div>
</div>

<div class="card">
  <strong>新規追加（買ったら登録）</strong>
  <label>証券コード（4桁）</label>
  <input type="text" id="h-code" placeholder="7203" maxlength="5" inputmode="numeric" />
  <div id="h-name-display" class="muted" style="margin-top:4px;min-height:18px;"></div>

  <div class="grid2">
    <div>
      <label>株数（100株単位推奨）</label>
      <input type="number" id="h-shares" placeholder="100" min="1" inputmode="numeric" />
    </div>
    <div>
      <label>取得単価（円）</label>
      <input type="number" id="h-avg" placeholder="502" step="0.5" inputmode="decimal" />
    </div>
  </div>
  <div id="ai-hint" class="muted" style="margin-top:6px; min-height:18px;"></div>
  <div class="grid2">
    <div>
      <label>損切ライン（円）<span id="sl-tag" style="font-size:10px; color:var(--g);"></span></label>
      <input type="number" id="h-sl" placeholder="自動予測" step="0.5" inputmode="decimal" />
    </div>
    <div>
      <label>利確ライン（円）<span id="tp-tag" style="font-size:10px; color:var(--g);"></span></label>
      <input type="number" id="h-tp" placeholder="自動予測" step="0.5" inputmode="decimal" />
    </div>
  </div>
  <div style="margin-top:6px;">
    <button class="sec" id="ai-fill" type="button" style="font-size:13px; padding:6px 12px;">🤖 AIで損切/利確を再計算</button>
  </div>
  <div style="margin-top:10px;">
    <button class="sec" id="add-h">＋ 追加（バッファ）</button>
    <span class="muted">追加後、下の「保存」で確定</span>
  </div>
</div>

<div class="card">
  <strong>GitHub PAT（端末ごとに1回）</strong>
  <input type="password" id="gh-pat" placeholder="ghp_..." />
</div>

<div class="row">
  <button class="primary" id="save">保存</button>
  <button class="sec" id="reload">repoから再取得</button>
  <button class="sec" id="check">いま価格チェック</button>
</div>

<div class="card" style="margin-top:14px;">
  <strong>ログ</strong>
  <div class="log" id="log">（ここに結果が出ます）</div>
</div>

<script src="common.js"></script>
<script>
const s = SML.state;
let stocksMap = {};
let predictions = {};   // {code: {sl_pct, tp_pct, rationale, source, name, price}}

function lookupName(code) {
  return stocksMap[code] || null;
}

function applyPrediction() {
  const code = document.getElementById('h-code').value.trim();
  const avgEl = document.getElementById('h-avg');
  const avg = parseFloat(avgEl.value);
  const slEl = document.getElementById('h-sl');
  const tpEl = document.getElementById('h-tp');
  const slTag = document.getElementById('sl-tag');
  const tpTag = document.getElementById('tp-tag');
  const hint = document.getElementById('ai-hint');
  if (!code || !avg || avg <= 0) {
    hint.textContent = '';
    slTag.textContent = ''; tpTag.textContent = '';
    return;
  }
  const p = predictions[code];
  if (!p) {
    if (Object.keys(predictions).length === 0) {
      hint.innerHTML = `ℹ️ AI予測データ未生成。朝の自動配信後に利用可能。今は手動入力してください。`;
    } else if (stocksMap[code]) {
      hint.innerHTML = `ℹ️ <strong>${code}</strong>はユニバース対象だが今回の予測に含まれず。手動入力推奨。`;
    } else {
      hint.innerHTML = `⚠️ <strong>${code}</strong>はAI予測対象外（ユニバース外）。手動入力してください。`;
    }
    return;
  }
  const sl = Math.round(avg * (1 + p.sl_pct / 100) * 10) / 10;
  const tp = Math.round(avg * (1 + p.tp_pct / 100) * 10) / 10;
  slEl.value = sl;
  tpEl.value = tp;
  const tag = p.source === 'ai' ? '🤖AI' : '📊ATR';
  slTag.textContent = ` ${tag}`; tpTag.textContent = ` ${tag}`;
  hint.innerHTML = `${tag} 予測: SL ${p.sl_pct}% (${sl}円) / TP +${p.tp_pct}% (${tp}円) — ${p.rationale}`;
}

function renderHoldings() {
  const wrap = document.getElementById('holdings-list');
  wrap.innerHTML = '';
  if (!s.holdings.length) {
    wrap.innerHTML = '<div class="muted">保有銘柄なし</div>';
    return;
  }
  s.holdings.forEach((h, i) => {
    const total = h.shares * h.avg_price;
    const div = document.createElement('div');
    div.className = 'holding';
    div.innerHTML = `
      <h4>${h.code} ${h.name} <span class="badge">${h.shares}株</span></h4>
      <div class="muted">取得 ${h.avg_price.toLocaleString()}円 × ${h.shares} = ${total.toLocaleString()}円</div>
      <div class="muted">損切 ${h.stop_loss ? h.stop_loss.toLocaleString()+'円' : '-'} / 利確 ${h.take_profit ? h.take_profit.toLocaleString()+'円' : '-'}</div>
      <div class="row-end">
        <button class="danger" data-i="${i}">売却済（削除）</button>
      </div>
    `;
    wrap.appendChild(div);
  });
  wrap.querySelectorAll('button.danger').forEach(b => {
    b.onclick = () => {
      const i = parseInt(b.dataset.i);
      if (confirm(`${s.holdings[i].name} を削除（売却処理）しますか？`)) {
        s.holdings.splice(i, 1);
        SML.save();
        renderHoldings();
        SML.log('削除しました（保存ボタンで反映）');
      }
    };
  });
}

document.getElementById('h-code').addEventListener('input', (e) => {
  const code = e.target.value.trim();
  const display = document.getElementById('h-name-display');
  if (code.length === 4) {
    const name = lookupName(code);
    display.textContent = name ? `🟢 ${name}` : '⚠️ 未登録銘柄。下に手動入力欄が出ます';
    display.style.color = name ? 'var(--g)' : '#999';
    let manual = document.getElementById('h-name-manual-row');
    if (!name) {
      if (!manual) {
        const row = document.createElement('div');
        row.id = 'h-name-manual-row';
        row.innerHTML = '<label>銘柄名（手動入力）</label><input type="text" id="h-name-manual" placeholder="例: 〇〇商事" />';
        display.parentNode.insertBefore(row, document.querySelector('.grid2'));
      }
    } else if (manual) {
      manual.remove();
    }
    // 取得単価が既に入力されてればAI予測適用
    applyPrediction();
  } else {
    display.textContent = '';
    const m = document.getElementById('h-name-manual-row');
    if (m) m.remove();
    document.getElementById('ai-hint').textContent = '';
  }
});

// 取得単価変更時もAI予測再計算
document.getElementById('h-avg').addEventListener('input', applyPrediction);
document.getElementById('ai-fill').addEventListener('click', applyPrediction);

document.getElementById('add-h').onclick = () => {
  const code = document.getElementById('h-code').value.trim();
  const auto = lookupName(code);
  const manual = document.getElementById('h-name-manual');
  const name = auto || (manual ? manual.value.trim() : '');
  const shares = parseInt(document.getElementById('h-shares').value);
  const avg = parseFloat(document.getElementById('h-avg').value);
  const sl = parseFloat(document.getElementById('h-sl').value);
  const tp = parseFloat(document.getElementById('h-tp').value);
  if (!code || !/^\d{4}$/.test(code)) { SML.log('❌ 4桁の銘柄コードを入力'); return; }
  if (!name) { SML.log('❌ 銘柄名（自動補完または手動）が空'); return; }
  if (!shares || shares <= 0) { SML.log('❌ 株数を入力'); return; }
  if (!avg || avg <= 0) { SML.log('❌ 取得単価を入力'); return; }
  s.holdings.push({
    id: `${code}-${Date.now()}`,
    code, name, shares, avg_price: avg,
    stop_loss: isNaN(sl) ? 0 : sl,
    take_profit: isNaN(tp) ? 0 : tp,
    added_at: new Date().toISOString(),
  });
  SML.save();
  ['h-code','h-shares','h-avg','h-sl','h-tp'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('h-name-display').textContent = '';
  const m = document.getElementById('h-name-manual-row');
  if (m) m.remove();
  renderHoldings();
  SML.log(`✅ ${name} (${code}) 追加。保存ボタンで repo に反映`);
};

async function loadFromRepo() {
  s.gh_pat = document.getElementById('gh-pat').value.trim();
  if (!s.gh_pat) return;
  SML.save();
  try {
    const cur = await SML.getRepoSettings();
    s.holdings = cur.body.holdings || [];
    SML.save();
    renderHoldings();
    SML.log(`📥 repoから ${s.holdings.length}銘柄 取得`);
  } catch (e) { SML.log(`❌ 取得失敗: ${e.message}`); }
}

document.getElementById('save').onclick = async () => {
  s.gh_pat = document.getElementById('gh-pat').value.trim();
  if (!s.gh_pat) { SML.log('❌ PATが未入力'); return; }
  SML.save();
  try {
    // 保存前に repo の最新holdingsとマージ（他端末で追加分を消さない）
    const cur = await SML.getRepoSettings();
    const remoteHoldings = cur.body.holdings || [];
    const localIds = new Set(s.holdings.map(h => h.id));
    // ローカルにないリモートID（=他端末で追加されたもの）を取り込む
    for (const rh of remoteHoldings) {
      if (!localIds.has(rh.id)) s.holdings.push(rh);
    }
    SML.save();
    renderHoldings();

    await SML.patchRepoSettings({ holdings: s.holdings },
      `Update holdings (count=${s.holdings.length})`);
    SML.log(`✅ 保存成功（${s.holdings.length}銘柄）`);
  } catch (e) { SML.log(`❌ ${e.message}`); }
};

document.getElementById('reload').onclick = loadFromRepo;

document.getElementById('check').onclick = async () => {
  s.gh_pat = document.getElementById('gh-pat').value.trim();
  SML.save();
  try { await SML.dispatch('price-alert.yml'); SML.log('🚀 価格チェック起動（突破時のみLINE通知）'); }
  catch (e) { SML.log(`❌ ${e.message}`); }
};

if (s.gh_pat) document.getElementById('gh-pat').value = s.gh_pat;

// stocks.json をロード
fetch('stocks.json').then(r => r.json()).then(d => {
  stocksMap = d;
  SML.log(`✅ ${Object.keys(d).length}銘柄の名称マスタ読込`);
}).catch(e => SML.log(`⚠️ 銘柄マスタ読込失敗: ${e.message}`));

// AI予測データ(SL/TP)をロード
fetch('predictions.json?_=' + Date.now()).then(r => r.json()).then(d => {
  predictions = d.predictions || {};
  const aiCount = Object.values(predictions).filter(p => p.source === 'ai').length;
  const total = Object.keys(predictions).length;
  const ts = d.generated_at ? new Date(d.generated_at).toLocaleString('ja-JP') : '-';
  SML.log(`🤖 AI予測 ${aiCount}/${total}銘柄 (生成: ${ts})`);
}).catch(e => SML.log(`⚠️ 予測データ未生成: 朝の自動配信後に利用可`));

renderHoldings();

// 起動時にrepoから自動取得（PATがあれば）
if (s.gh_pat) {
  setTimeout(() => loadFromRepo(), 500);
}
</script>
</body>
</html>
