<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<title>朝ニュース設定</title>
<meta name="viewport" content="width=device-width,initial-scale=1" />
<link rel="stylesheet" href="styles.css" />
</head>
<body>
<a class="back" href="index.html">← ホームへ</a>
<h1>📰 朝ニュース設定</h1>

<div class="card">
  <strong>1. 予算（100株単位で買える銘柄を推奨）</strong>
  <div class="muted">例: 10万円 → 株価1,000円以下の銘柄を100株<br>例: 50万円 → 株価5,000円以下の銘柄を100株</div>
  <div class="budget" id="budget-buttons"></div>
</div>

<div class="card">
  <strong>2. 配信スケジュール</strong>
  <div class="toggle" style="margin-top:8px;">
    <input type="checkbox" id="delivery-enabled" />
    <label for="delivery-enabled" style="margin:0;">営業日（月〜金）の朝8時に配信する</label>
  </div>
  <div class="muted" style="margin-top:8px; line-height:1.6;">
    ✅ ON: 月〜金の平日のみ配信（土日・祝日・年末年始は自動スキップ）<br>
    ❌ OFF: 配信を完全停止
  </div>
</div>

<div class="card">
  <strong>3. GitHub PAT（端末ごとに1回）</strong>
  <div class="muted">PATは端末のブラウザに保存され外部送信されません</div>
  <input type="password" id="gh-pat" placeholder="ghp_..." />
</div>

<div class="row">
  <button class="primary" id="save">設定を保存</button>
  <button class="sec" id="test">今すぐ朝のブリーフ配信</button>
</div>

<div class="card" style="margin-top:14px;">
  <strong>ログ</strong>
  <div class="log" id="log">（ここに結果が出ます）</div>
</div>

<script src="common.js"></script>
<script>
const BUDGETS = [5, 10, 20, 30, 50, 100];
const s = SML.state;

function renderBudget() {
  const wrap = document.getElementById('budget-buttons');
  wrap.innerHTML = '';
  BUDGETS.forEach(b => {
    const btn = document.createElement('button');
    btn.textContent = `${b}万`;
    btn.className = (s.budget_man === b) ? 'active' : '';
    btn.onclick = () => { s.budget_man = b; SML.save(); renderBudget(); };
    wrap.appendChild(btn);
  });
}

function init() {
  // delivery_enabled が未設定なら true をデフォルト
  document.getElementById('delivery-enabled').checked = s.delivery_enabled !== false;
  if (s.gh_pat) document.getElementById('gh-pat').value = s.gh_pat;
  renderBudget();
}

document.getElementById('save').onclick = async () => {
  s.delivery_enabled = document.getElementById('delivery-enabled').checked;
  s.gh_pat = document.getElementById('gh-pat').value.trim();
  if (!s.budget_man) { SML.log('予算ボタンを選んでください'); return; }
  if (!s.gh_pat) { SML.log('PATが未入力'); return; }
  SML.save();
  try {
    await SML.patchRepoSettings({
      budget_man: s.budget_man,
      allow_odd_lots: false,
      delivery_enabled: s.delivery_enabled,
      allowed_weekends: [],
      allowed_dates: [],
      max_news_chars: 220,
      important_news_max_chars: 400,
      include_links: true,
    }, `Update morning settings (budget=${s.budget_man}万, enabled=${s.delivery_enabled})`);
    const status = s.delivery_enabled ? '営業日のみ配信' : '配信停止中';
    SML.log(`✅ 保存成功（予算 ${s.budget_man}万・${status}）`);
  } catch (e) { SML.log(`❌ ${e.message}`); }
};

document.getElementById('test').onclick = async () => {
  s.gh_pat = document.getElementById('gh-pat').value.trim();
  SML.save();
  try { await SML.dispatch('morning.yml'); SML.log('🚀 朝のブリーフ起動。1〜2分後にLINE'); }
  catch (e) { SML.log(`❌ ${e.message}`); }
};

init();
if (new URLSearchParams(location.search).get('auto') === 'run') {
  if (s.gh_pat) { SML.log('自動配信中...'); document.getElementById('test').click(); }
  else { SML.log('初回はPATを入力して保存→配信を押してください'); }
}
</script>
</body>
</html>
